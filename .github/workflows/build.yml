name: Build Windows 64-bit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild SoundKeeper.sln /p:Configuration=Release /p:Platform=Win64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundKeeper-Win64
          path: |
            **/Release/**/*.exe
            **/Win64/Release/**/*.exe
